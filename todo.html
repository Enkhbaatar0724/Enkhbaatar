<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks · Enkhbaatar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #1f1f28;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f5;
      --muted: #6b6b7e;
      --accent: #7c6aff;
      --accent-soft: rgba(124,106,255,0.15);
      --accent-border: rgba(124,106,255,0.35);
      --green: #22c55e;
      --green-soft: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-soft: rgba(239,68,68,0.1);
      --amber: #f59e0b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem 5rem;
    }

    .wrap { width: 100%; max-width: 560px; }

    .hero { margin-bottom: 2.5rem; }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .logo-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .date-pill {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: var(--text);
    }

    .hero h1 span { color: var(--accent); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .stat:hover { border-color: var(--border2); }

    .stat-num {
      font-size: 26px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #total-count { color: var(--text); }
    #done-count { color: var(--green); }
    #pending-count { color: var(--amber); }

    .progress-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 1.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-label span:last-child { color: var(--green); font-weight: 500; }

    .progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-wrap input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--accent-border); }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.97); }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }

    .f-btn {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .f-btn:hover { color: var(--text); border-color: var(--border2); }
    .f-btn.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task:hover { border-color: var(--border2); }
    .task.done { opacity: 0.5; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task.done .check-btn {
      background: var(--green);
      border-color: var(--green);
    }

    .check-icon { display: none; width: 11px; height: 11px; }
    .task.done .check-icon { display: block; }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .task.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .del-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { background: var(--red-soft); color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 3.5rem 0;
      color: var(--muted);
    }

    .empty-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px dashed var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 22px;
    }

    .empty-state p { font-size: 14px; }

    .bottom-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: var(--red); border-color: rgba(239,68,68,0.3); background: var(--red-soft); }

    .footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 12px;
      color: var(--muted);
    }

    .footer span { color: var(--accent); }

    @media (max-width: 480px) {
      .hero h1 { font-size: 26px; }
      .stat-num { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-top">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">My Tasks</span>
      </div>
      <div class="date-pill" id="date-label"></div>
    </div>
    <h1>Get things <span>done.</span></h1>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="done-count">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pending-count">0</div>
      <div class="stat-label">Left</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="pct-label">0% complete</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="input-wrap">
    <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="120" />
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="filters">
    <button class="f-btn active" onclick="setFilter('all',this)">All</button>
    <button class="f-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="f-btn" onclick="setFilter('done',this)">Completed</button>
  </div>

  <div class="section-label" id="list-label">Tasks</div>
  <div class="task-list" id="task-list"></div>

  <div class="bottom-row">
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>

  <div class="footer">Built with <span>AI</span> · Enkhbaatar Bayanmunkh</div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('eb-tasks') || '[]');
  let filter = 'all';

  const D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  document.getElementById('date-label').textContent = D[now.getDay()] + ', ' + M[now.getMonth()] + ' ' + now.getDate();

  function save() { localStorage.setItem('eb-tasks', JSON.stringify(tasks)); }

  function addTask() {
    const inp = document.getElementById('task-input');
    const text = inp.value.trim();
    if (!text) {
      inp.style.borderColor = '#ef4444';
      setTimeout(() => inp.style.borderColor = '', 600);
      return;
    }
    tasks.unshift({ id: Date.now(), text, done: false });
    inp.value = '';
    save(); render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(); render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('total-count').textContent = total;
    document.getElementById('done-count').textContent = done;
    document.getElementById('pending-count').textContent = pending;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('pct-label').textContent = pct + '% complete';

    const filtered = tasks.filter(t => {
      if (filter === 'done') return t.done;
      if (filter === 'pending') return !t.done;
      return true;
    });

    document.getElementById('list-label').textContent =
      filter === 'done' ? 'Completed' : filter === 'pending' ? 'Pending' : 'All tasks';

    const list = document.getElementById('task-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-ring">✓</div><p>' +
        (filter === 'done' ? 'Nothing completed yet' : filter === 'pending' ? 'All done!' : 'No tasks yet — add one above') +
        '</p></div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleTask(${t.id})" aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}">
          <svg class="check-icon" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="task-text">${escHtml(t.text)}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})" aria-label="Delete task">×</button>
      </div>
    `).join('');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
